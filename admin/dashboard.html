<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم الإدارة | نسيج</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cairo:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-pg1GMY09LH2E9fXJKV0DgEV0+gyD4qvGc4mK36bFoLfbM8Pj9Y5X8smkXj4ArBf6nompdf72/rqaT1xg1olcKQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="admin-page cairo-400">
  <div class="admin-card">
    <header class="admin-header">
      <h1>لوحة تحكم الإدارة</h1>
      <button id="logoutBtn" class="admin-btn cancel">تسجيل خروج</button>
    </header>
    <div class="admin-grid">
      <section class="admin-panel">
        <h2>إضافة أو تعديل منتج</h2>
        <form id="productForm">
          <div class="admin-row">
            <div class="form-group">
              <label class="form-label" for="prodName">اسم المنتج</label>
              <input id="prodName" class="admin-input" placeholder="مثال: حرير ملكي" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prodCategory">التصنيف</label>
              <input id="prodCategory" class="admin-input" placeholder="مثال: حرير وشيفون" required />
            </div>
          </div>
          <div class="admin-row">
            <div class="form-group">
              <label class="form-label" for="prodPrice">السعر</label>
              <input id="prodPrice" type="number" min="1" class="admin-input" placeholder="مثال: 450" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prodBadge">علامة المنتج</label>
              <input id="prodBadge" class="admin-input" placeholder="مثال: الأكثر مبيعاً أو جديد" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="prodImageUrl">تحميل صورة المنتج</label>
            <input type="file" id="prodImageUrl" class="admin-input" accept="image/*" />
          </div>
          <div class="form-group">
            <label class="form-label" for="prodColor">لون المنتج</label>
            <input id="prodColor" class="admin-input" placeholder="مثال: أزرق أو أحمر" />
          </div>
          <div class="form-group">
            <label class="form-label" for="prodDesc">وصف المنتج</label>
            <textarea id="prodDesc" class="admin-textarea" placeholder="وصف قصير للمنتج"></textarea>
          </div>
          <div class="admin-actions">
            <button type="button" id="saveProductBtn" class="admin-btn save">حفظ المنتج</button>
            <button type="button" id="clearFormBtn" class="admin-btn cancel">مسح النموذج</button>
          </div>
          <input type="hidden" id="currentProductId" value="" />
        </form>
      </section>
      <section class="admin-list">
        <h2>قائمة المنتجات</h2>
        <div id="productTableContainer"></div>
        <div class="admin-empty" id="adminEmpty">لم يتم العثور على منتجات حتى الآن.</div>
      </section>
    </div>
  </div>
  <script type="module" src="../js/admin.js"></script>
</body>

</html>
